<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../dist/output.css" rel="stylesheet">
  <link href="./output.css" rel="stylesheet">
  <script src="./assets/fontawesome/js/fontawesome.min.js"></script>
  <script src="./assets/fontawesome/js/solid.min.js"></script>

  <title>TW:MF</title>
</head>
<body>
  <main>
    <header class="text-zinc-200">
      <nav class="sticky top-0 flex bg-linear-to-r from-rose-500 to-pink-500">
        <div class="flex items-center p-2 gap-2">
          <img src="./assets/images/logo-inverted.png" alt="" width="50"> 
          <div class="font-bold text-2xl">
              tw:<span class="text-sky-900">mf</span>
          </div>
        </div>
        <div class="block md:hidden ml-auto my-auto pr-4 cursor-pointer">
          <div id="mobile-menu-button" class="group">
            <div class="bg-zinc-200 rounded-full w-8 h-1 "></div>
            <div class="bg-zinc-200 rounded-full w-8 h-1 mt-1"></div>
            <div class="bg-zinc-200 rounded-full w-8 h-1 mt-1"></div>
          </div>
        </div>

        <div class="flex-1 items-center justify-end hidden md:flex ">
          <div class="menu-item">
            <span>Home</span>
          </div>
          <div class="menu-item">
            <span>Lineup</span>
          </div>
          <div class="menu-item group">
            <span>Tickets</span>
            <div class="group-hover:block hidden absolute bg-pink-500 top-full right-0 whitespace-nowrap rounded-b-md text-right">
              <div class="p-4 font-bold hover:bg-white/5 hover:text-zinc-200 transition-colors ease-in-out text-pink-200">
                <span>Single day ticket</span>
              </div>
              <div class="p-4 font-bold hover:bg-white/5 hover:text-zinc-200 transition-colors ease-in-out text-pink-200">
                <span>7 day ticket</span>
              </div>
            </div>
          </div>
          <div class="menu-item">
            <span>Support</span>
          </div>
        </div>
      </nav>
      <div style="background-image: url('./assets/images/hero.jpg');" class="flex flex-col justify-center items-center bg-cover bg-center bg-fixed h-min-[400px] h-[calc(100vh-200px)]">
        <div class="bg-white/30 py-2 px-4 rounded-xl text-center backdrop-blur-md">
          <div class="relative">
            <img src="./assets/images/logo.png" width="175px">
          </div>
          <div class="text-5xl font-bold">
            tw:<span class="text-sky-900">mf</span>
          </div>
        </div>
        <div class="font-bold mt-3 text-sm">
          Keep me update with news and promotions
        </div>
        <form class="mt-3 flex gap-2">
          <input type="email" placeholder="Email" class="border rounded-sm border-white/40 bg-white/30 backdrop-blur-md p-2 font-bold text-sky-900 placeholder-zinc-500 caret-pink-500 outline-pink-500 focus:outline">
          <button type="submit" class="cursor-pointer rounded-sm bg-pink-500 py-2 px-4 font-bold transition-colors hover:bg-sky-900 hover:shadow-lg hover:shadow-black/20">
          Subscribe
          </button>
        </form>
        
      </div>
    </header>

    <div class="max-w-5xl mx-auto mt-20">
      <h1>Headliners</h1>
      <p>
        Experience the sonic delight from these made-up artists across 7 days
        that music fans are calling "one of the many gigs that will happen this year"
      </p>
    </div>

  </main>
</body>
</html>
